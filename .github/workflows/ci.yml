name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check runtime hygiene
        run: python scripts/check_runtime.py --strict

      - name: Run unit and integration tests
        run: python -m pytest -q

      - name: Run Level 1 convergence script
        run: |
          python scripts/test_level1.py \
            --steps 220 \
            --num-sequences 192 \
            --seq-len 20 \
            --batch-size 32

  benchmark-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Phase6 smoke benchmark gates
        run: |
          python scripts/run_benchmarks.py \
            --profile phase6 \
            --mode smoke \
            --output runs/benchmarks/ci_smoke_summary.json

      - name: Upload smoke benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-summary
          path: runs/benchmarks/ci_smoke_summary.json
